db:
  kuzu_path: /data/gigabrain.kuzu
  vector_path: /data/gigabrain-vec.sqlite

embeddings:
  provider: ollama
  model: nomic-embed-text
  base_url: http://ollama:11434

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY

telemetry:
  otlp_endpoint: file:///data/traces

gigaflow:
  enabled: false
  manifest_url: null
  poll_interval_minutes: 60

agents:
  yaml_path: /app/backend/agents.yaml.example
  vault_path: /data/vault
  repo_path: null

capture:
  backend_url: http://localhost:8000
  timeout_seconds: 5.0

webhooks:
  linear_secret_env: LINEAR_WEBHOOK_SECRET
  github_secret_env: GITHUB_WEBHOOK_SECRET

watchers:
  obsidian:
    enabled: false
    debounce_seconds: 2.0
    ignore_patterns:
      - .git/*
      - .obsidian/*
      - "*.gigabrain*"
